<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        "surface": "rgb(var(--c-surface) / <alpha-value>)",
        "primary": "rgb(var(--c-primary) / <alpha-value>)",
        "secondary": "rgb(var(--c-secondary) / <alpha-value>)",
        "on-surface": "rgb(var(--c-on-surface) / <alpha-value>)",
        "on-surface-variant": "rgb(var(--c-on-surface-variant) / <alpha-value>)",

<!-- Global styles -->
<style>
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background-color: rgb(var(--c-surface));
    color: rgb(var(--c-on-surface));
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  /* Override legacy Jekyll styles */
  .modern-layout .masthead,
  .modern-layout .page,
  .modern-layout .page__inner-wrap,
  .modern-layout .page__content,
  .modern-layout #main {
    background: transparent;
    max-width: 100%;
    padding: 0;
    margin: 0;
    float: none;
    width: 100%;
  }
  .modern-layout .sidebar {
    display: none;
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: rgb(var(--c-surface)); }
  ::-webkit-scrollbar-thumb { background: rgb(var(--c-outline-variant)); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgb(var(--c-on-surface-variant)); }
  /* Selection */
  ::selection {
    background-color: rgb(var(--c-primary) / 0.2);
    color: rgb(var(--c-on-surface));
  }
</style>
