<!-- Custom global styles for the dark theme -->
<style type="text/tailwindcss">
  @layer base {
    html {
      scroll-behavior: smooth;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #10141a;
      color: #dfe2eb;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Override legacy styles on about page */
    .dark-theme-override .masthead,
    .dark-theme-override .page,
    .dark-theme-override .page__inner-wrap,
    .dark-theme-override .page__content,
    .dark-theme-override #main {
      background: transparent;
      max-width: 100%;
      padding: 0;
      margin: 0;
      float: none;
      width: 100%;
    }
    /* Hide legacy sidebar */
    .dark-theme-override .sidebar {
      display: none;
    }
    /* Custom scrollbar for dark theme */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #10141a;
    }
    ::-webkit-scrollbar-thumb {
      background: #45474c;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #c5c6cc;
    }
    /* Selection color */
    ::selection {
      background-color: rgba(233, 193, 118, 0.3);
      color: #ffdea5;
    }
  }
</style>
